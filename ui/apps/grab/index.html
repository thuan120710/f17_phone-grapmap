<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Grab</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="grab-container">
        <!-- Status Bar -->
        <div class="status-bar" id="statusBar">
            <span id="statusText">Ứng dụng Grab đã sẵn sàng</span>
        </div>

        <!-- Full Screen Map -->
        <div class="map-section">
            <div id="map" class="map-container"></div>
        </div>

        <!-- Main Menu (Default) -->
        <div class="main-menu" id="mainMenu">
            <button class="main-btn passenger-btn" id="passengerBtn">
                👤 Khách hàng
            </button>
            <button class="main-btn driver-btn" id="driverBtn">
                🚗 Tài xế
            </button>
        </div>

        <!-- Passenger Panel -->
        <div class="bottom-panel" id="passengerPanel">
            <div class="panel-header">
                <button class="back-btn" id="backToMainFromPassenger">←</button>
                <h3>Dịch vụ khách hàng</h3>
                <div class="status-info">
                    <span class="status-text" id="passengerStatus">✅ Sẵn sàng</span>
                </div>
            </div>

            <!-- Passenger Booking Menu -->
            <div class="menu-section" id="passengerBookingMenu">
                <button class="grab-btn primary" id="bookRideBtn">
                    🚗 Đặt xe Grab
                </button>
            </div>

            <!-- Request Ride Menu -->
            <div class="menu-section hidden" id="requestRideMenu">
                <button class="grab-btn primary" id="requestRideBtn">
                    📍 Đặt xe ngay
                </button>
                <button class="grab-btn secondary" id="backToBookingBtn">
                    ← Quay lại
                </button>
            </div>

            <!-- Active Ride Menu (Passenger) -->
            <div class="menu-section hidden" id="passengerActiveRideMenu">
                <button class="grab-btn danger" id="cancelRideBtn">
                    ❌ Hủy chuyến
                </button>
            </div>

            <!-- Passenger Info Section -->
            <div class="info-section">
                <div class="info-item">
                    <span class="info-label">Vị trí:</span>
                    <span class="info-value" id="currentLocation">Đang tải...</span>
                </div>
                <div class="info-item hidden" id="pickupInfo">
                    <span class="info-label">📍 Điểm đón:</span>
                    <span class="info-value" id="pickupLocation">-</span>
                </div>
                <div class="info-item hidden" id="dropoffInfo">
                    <span class="info-label">🏁 Điểm trả:</span>
                    <span class="info-value" id="dropoffLocation">-</span>
                </div>
                <div class="info-item hidden" id="rideInfo">
                    <span class="info-label">Chuyến xe:</span>
                    <span class="info-value" id="rideDetails">-</span>
                </div>
                <div class="info-item hidden" id="priceInfo">
                    <span class="info-label">Giá ước tính:</span>
                    <span class="info-value" id="estimatedPrice">$0</span>
                </div>
            </div>
        </div>

        <!-- Driver Panel -->
        <div class="bottom-panel" id="driverPanel">
            <div class="panel-header">
                <button class="back-btn" id="backToMainFromDriver">←</button>
                <h3>Dịch vụ tài xế</h3>
                <div class="status-info">
                    <span class="status-text" id="driverStatus">🔴 Chưa đăng ký</span>
                </div>
            </div>

            <!-- Driver Registration Menu -->
            <div class="menu-section" id="driverRegisterMenu">
                <button class="grab-btn primary" id="registerDriverBtn">
                    🚕 Đăng ký làm tài xế
                </button>
            </div>

            <!-- Driver Active Menu -->
            <div class="menu-section hidden" id="driverMenu">
                <button class="grab-btn driver-toggle active" id="toggleDriverStatusBtn">
                    🟢 Đang hoạt động
                </button>
                <button class="grab-btn secondary" id="unregisterDriverBtn">
                    ❌ Hủy đăng ký tài xế
                </button>
            </div>

            <!-- Active Ride Menu (Driver) -->
            <div class="menu-section hidden" id="driverActiveRideMenu">
                <button class="grab-btn primary hidden" id="acceptRideBtn">
                    ✅ Chấp nhận chuyến
                </button>
                <button class="grab-btn secondary hidden" id="rejectRideBtn">
                    ❌ Từ chối
                </button>
                <button class="grab-btn danger" id="cancelDriverRideBtn">
                    ❌ Hủy chuyến
                </button>
            </div>

            <!-- Driver Info Section -->
            <div class="info-section">
                <div class="info-item hidden" id="driverCount">
                    <span class="info-label">Tài xế online:</span>
                    <span class="info-value" id="onlineDrivers">0</span>
                </div>
                <div class="info-item hidden" id="driverRideInfo">
                    <span class="info-label">Chuyến xe:</span>
                    <span class="info-value" id="driverRideDetails">-</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>

</html>
